# =======================================
# Server
# =======================================
spring.config.import=optional:classpath:application-local.properties
server.port=${SERVER_PORT:8080}

# =======================================
# Datasource
# =======================================
# Provide credentials through environment variables or an untracked
# application-local.properties file.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/my_mini_project_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# =======================================
# JPA / Hibernate
# =======================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# =======================================
# Uploads
# =======================================
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:35MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:500MB}

# Keep uploads configurable so the project can move across machines.
myapp.upload-dir=${MYAPP_UPLOAD_DIR:${UPLOAD_DIR:./uploads}}
myapp.avatar-upload-dir=${MYAPP_AVATAR_UPLOAD_DIR:${myapp.upload-dir}/avatars}

# =======================================
# AI provider
# =======================================
alibaba.api.key=${ALIBABA_API_KEY:}

#server.forward-headers-strategy=FRAMEWORK
