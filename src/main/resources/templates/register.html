<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>注册账号</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #2b221c;
        background:
          radial-gradient(circle at top left, rgba(181, 101, 59, 0.18), transparent 28%),
          radial-gradient(circle at 82% 22%, rgba(120, 142, 118, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f3ea 0%, #f3ede3 100%);
        background-size: cover;
      }

      .auth-card {
        width: min(90%, 400px);
        padding: 42px;
        background: rgba(255, 251, 245, 0.78);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(70, 45, 28, 0.12);
        border: 1px solid rgba(113, 84, 58, 0.10);
        animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
        text-align: center;
      }

      @keyframes floatUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        font-size: 1.9rem;
        font-weight: 700;
        margin: 0 0 28px;
        color: #2b221c;
        letter-spacing: 0.08em;
        font-family: "Songti SC", "STSong", "SimSun", serif;
      }

      form {
        text-align: left;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        color: #5f5045;
        padding-left: 4px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 13px 16px;
        border: 1px solid rgba(113, 84, 58, 0.12);
        border-radius: 16px;
        font-size: 1rem;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.55);
        transition: all 0.2s;
        outline: none;
      }

      input:focus {
        background: #fff;
        border-color: #b5653b;
        box-shadow: 0 0 0 4px rgba(181, 101, 59, 0.12);
      }

      button {
        width: 100%;
        background: #7d9a68;
        color: #fff;
        padding: 14px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 600;
        margin-top: 10px;
        transition: transform 0.1s, background-color 0.2s;
      }

      button:hover {
        background: #6c875a;
      }

      button:active {
        transform: scale(0.98);
      }

      .login-link {
        display: inline-block;
        margin-top: 24px;
        color: #b5653b;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .login-link:hover {
        opacity: 0.8;
      }

      .error-message {
        background-color: rgba(255, 59, 48, 0.1);
        color: #d14336;
        padding: 12px;
        border-radius: 12px;
        font-size: 0.92rem;
        margin-bottom: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h2>注册访客账号</h2>

      <div th:if="${error}" class="error-message" th:text="${error}">
        用户名已被占用
      </div>

      <form th:action="@{/register}" method="POST">
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="设置一个用户名"
          />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="设置登录密码"
          />
        </div>
        <button type="submit">立即注册</button>
      </form>

      <a th:href="@{/login}" class="login-link">已有账号？返回登录 &rarr;</a>
    </div>
  </body>
</html>
