<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${album.title}">相册详情</title>
    <style>
      body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8f3ea 0%, #f3ede3 100%);
        padding: 40px 20px;
        margin: 0;
        color: #2b221c;
      }
      .container { max-width: 1200px; margin: 0 auto; }
      .header { text-align: center; margin-bottom: 50px; }
      .header h1 {
        margin: 0 0 15px 0;
        font-size: 2.4rem;
        font-family: "Songti SC", "STSong", "SimSun", serif;
        letter-spacing: 0.08em;
      }
      .header p { color: #7a6a5d; font-size: 1.05rem; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.7; }
      .delete-album-btn {
        color: #d95b4d;
        background: rgba(217, 91, 77, 0.08);
        border: 1px solid rgba(217, 91, 77, 0.22);
        padding: 8px 16px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.92rem;
        font-weight: 700;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
      .photo-card {
        background: rgba(255, 251, 245, 0.88);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(70, 45, 28, 0.08);
        transition: transform 0.2s;
        border: 1px solid rgba(113, 84, 58, 0.08);
      }
      .photo-card:hover { transform: translateY(-5px); }
      .photo-card img { width: 100%; height: 220px; object-fit: cover; display: block; }
      .card-info { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
      .card-title { font-weight: 700; color: #2b221c; font-size: 1rem; }
      .footer-links {
        margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(113, 84, 58, 0.10);
        display: flex; gap: 12px; justify-content: center;
      }
      .btn-secondary {
        display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px;
        background-color: rgba(255, 251, 245, 0.92); color: #5f5045; border-radius: 999px;
        text-decoration: none; font-size: 0.95rem; font-weight: 600; border: 1px solid rgba(113, 84, 58, 0.10);
      }
      .btn-secondary svg { width: 16px; height: 16px; margin-right: 6px; stroke-width: 2.5; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 th:text="${album.title}">相册标题</h1>
        <p th:text="${album.description}">相册描述</p>
        <form th:action="@{/album/delete/{id}(id=${album.id})}" method="POST"
          onsubmit="return confirm('确定删除这个相册吗？照片本身不会被删除。')">
          <button class="delete-album-btn">删除相册</button>
        </form>
      </div>
      <div class="grid">
        <div th:each="photo : ${album.photos}" class="photo-card">
          <a th:href="@{/gallery(query=${photo.title})}">
            <img th:src="${photo.thumbnailUrl != null ? photo.thumbnailUrl : photo.imageUrl}" loading="lazy" />
          </a>
          <div class="card-info">
            <span class="card-title" th:text="${photo.title}">Title</span>
          </div>
        </div>
      </div>
      <div th:if="${#lists.isEmpty(album.photos)}" style="text-align: center; color: #8c7b6d; padding: 60px">
        这个相册里还没有照片，去 <a th:href="@{/gallery}" style="color: #b5653b">画廊</a> 添加一些吧。
      </div>
      <div class="footer-links">
        <a th:href="@{/albums}" class="btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <rect x="7" y="7" width="3" height="3"></rect>
            <rect x="14" y="7" width="3" height="3"></rect>
            <rect x="7" y="14" width="3" height="3"></rect>
            <rect x="14" y="14" width="3" height="3"></rect>
          </svg>
          返回相册列表
        </a>
        <a th:href="@{/gallery}" class="btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
          返回画廊
        </a>
      </div>
    </div>
  </body>
</html>
