<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>消息中心</title>
    <style>
      body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8f3ea 0%, #f3ede3 100%);
        padding: 24px;
        margin: 0;
        color: #2b221c;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
        background: rgba(255, 251, 245, 0.88);
        padding: 28px;
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(70, 45, 28, 0.10);
        border: 1px solid rgba(113, 84, 58, 0.10);
        backdrop-filter: blur(10px);
      }

      h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-family: "Songti SC", "STSong", "SimSun", serif;
        letter-spacing: 0.08em;
      }

      .notif-item {
        display: flex;
        gap: 15px;
        padding: 16px 0;
        border-bottom: 1px solid rgba(113, 84, 58, 0.10);
        align-items: start;
      }

      .notif-item:last-child {
        border-bottom: none;
      }

      .actor-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
      }

      .notif-content {
        flex-grow: 1;
      }

      .notif-text {
        font-size: 0.96rem;
        line-height: 1.7;
        margin-bottom: 4px;
      }

      .notif-time {
        font-size: 0.82rem;
        color: #8c7b6d;
      }

      .photo-preview {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 10px;
      }

      .empty-msg {
        text-align: center;
        color: #8c7b6d;
        padding: 46px 20px;
      }

      .badge-like {
        color: #d95b4d;
        font-weight: 700;
      }

      .badge-comment {
        color: #b5653b;
        font-weight: 700;
      }

      .footer-links {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid rgba(113, 84, 58, 0.10);
        display: flex;
        gap: 12px;
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        background-color: rgba(255, 251, 245, 0.92);
        color: #5f5045;
        border-radius: 999px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        transition: all 0.2s ease;
        border: 1px solid rgba(113, 84, 58, 0.10);
      }

      .btn-secondary:hover {
        background-color: #fff;
        transform: translateY(-1px);
      }

      .btn-secondary svg {
        width: 16px;
        height: 16px;
        margin-right: 6px;
        stroke-width: 2.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>消息中心</h2>

      <div th:if="${#lists.isEmpty(notifications)}" class="empty-msg">
        暂时还没有新消息
      </div>

      <div th:each="n : ${notifications}" class="notif-item">
        <img
          th:src="${n.actor.avatarUrl != null ? n.actor.avatarUrl : '/images/default_avatar.png'}"
          class="actor-avatar"
        />

        <div class="notif-content">
          <div class="notif-text">
            <strong th:text="${n.actor.username}">User</strong>

            <span th:if="${n.type == 'LIKE'}">
              <span class="badge-like">赞了</span> 你的作品
            </span>
            <span th:if="${n.type == 'COMMENT'}">
              <span class="badge-comment">评论了</span> 你的作品：
              <br />
              <span style="color: #6f5f53" th:text="${n.content}">评论内容</span>
            </span>
            <span th:if="${n.type == 'REPLY'}">
              <span class="badge-comment">回复了</span> 你的评论：
              <br />
              <span style="color: #6f5f53" th:text="${n.content}">回复内容</span>
            </span>
          </div>
          <div
            class="notif-time"
            th:text="${#temporals.format(n.createdAt, 'MM-dd HH:mm')}"
          >
            Time
          </div>
        </div>

        <a th:href="@{/gallery(query=${n.photo.title})}">
          <img th:src="${n.photo.thumbnailUrl}" class="photo-preview" />
        </a>
      </div>

      <div class="footer-links">
        <a th:href="@{/gallery}" class="btn-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          返回画廊
        </a>
      </div>
    </div>
  </body>
</html>
