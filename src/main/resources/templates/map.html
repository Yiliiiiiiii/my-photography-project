<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>足迹地图</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f3ede3;
      }

      #map {
        width: 100%;
        height: 100vh;
        z-index: 1;
      }

      .nav-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(255, 251, 245, 0.88);
        padding: 12px 16px;
        border-radius: 18px;
        box-shadow: 0 16px 36px rgba(70, 45, 28, 0.12);
        border: 1px solid rgba(113, 84, 58, 0.10);
        backdrop-filter: blur(10px);
      }

      .back-btn {
        text-decoration: none;
        color: #b5653b;
        font-weight: 700;
        font-size: 0.98rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .custom-popup img {
        width: 100%;
        max-width: 200px;
        border-radius: 10px;
        margin-bottom: 8px;
        display: block;
      }

      .custom-popup h3 {
        margin: 0 0 6px 0;
        font-size: 1rem;
        color: #2b221c;
      }

      .custom-popup p {
        margin: 0;
        font-size: 0.82rem;
        color: #7a6a5d;
      }

      .custom-popup a {
        display: block;
        margin-top: 10px;
        color: #b5653b;
        text-decoration: none;
        font-size: 0.86rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="nav-overlay">
      <a th:href="@{/gallery}" class="back-btn">&laquo; 返回画廊</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
      var map = L.map("map").setView([35.0, 105.0], 4);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: "abcd",
          maxZoom: 19,
        }
      ).addTo(map);

      fetch("/api/map-data")
        .then((response) => response.json())
        .then((photos) => {
          var markers = [];

          photos.forEach((photo) => {
            if (photo.latitude && photo.longitude) {
              var popupContent = `
                <div class="custom-popup">
                  <img src="${photo.thumbnailUrl}" alt="photo">
                  <h3>${photo.title}</h3>
                  <p>${photo.takenAt || ""}</p>
                  <a href="/gallery?query=${encodeURIComponent(photo.title)}">查看详情</a>
                </div>
              `;

              var marker = L.marker([photo.latitude, photo.longitude])
                .addTo(map)
                .bindPopup(popupContent);

              markers.push(marker);
            }
          });

          if (markers.length > 0) {
            var group = new L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.1));
          }
        })
        .catch((err) => console.error("加载地图数据失败", err));
    </script>
  </body>
</html>
