<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>朝花夕拾 - 摄影日志</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      :root {
        --accent: #b5653b;
        --text-primary: #2b221c;
        --text-secondary: #7a6a5d;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-primary);
        background:
          radial-gradient(circle at top left, rgba(181, 101, 59, 0.18), transparent 28%),
          radial-gradient(circle at 82% 22%, rgba(120, 142, 118, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f3ea 0%, #f3ede3 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      body::after {
        content: "";
        position: fixed;
        inset: -50%;
        pointer-events: none;
        z-index: -1;
        background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAA5OTkAAABERERmZmZ0dHR/f3+ZmZkU3V2vAAAACHRSTlMAMwAyyN3u7wcI3VwAAAB4SURBVDjLY2AYBaNgFIyCUTAKRsEoGAWjYBSMglEwCkbBKBgFo2AUjIJRMApGwSgYBaNgFIyCUTAKRsEoGAWjYBSMglEwCkbBKBgFo2AUjIJRMApGwSgAAK90A/1645K/AAAAAElFTkSuQmCC");
        background-size: 100px 100px;
        opacity: 0.04;
      }

      .hero-card {
        width: min(90%, 920px);
        padding: 76px 40px;
        text-align: center;
        background: rgba(255, 251, 245, 0.78);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(113, 84, 58, 0.10);
        border-radius: 32px;
        box-shadow: 0 28px 72px rgba(70, 45, 28, 0.12);
      }

      .greeting {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 15px;
      }

      .brand-logo {
        font-size: 4rem;
        font-weight: 700;
        margin: 0 0 15px 0;
        font-family: "Songti SC", "STSong", "SimSun", serif;
        letter-spacing: 0.16em;
      }

      .brand-slogan {
        font-size: 1.08rem;
        color: var(--text-secondary);
        margin-bottom: 54px;
        line-height: 1.8;
      }

      .stats-grid {
        display: flex;
        justify-content: center;
        gap: 80px;
        margin-bottom: 54px;
      }

      .stat-item h3 {
        font-size: 3.2rem;
        font-weight: 700;
        margin: 0;
        color: var(--accent);
        line-height: 1;
      }

      .stat-item p {
        margin: 12px 0 0 0;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-secondary);
        font-weight: 700;
      }

      .action-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
      }

      .btn {
        padding: 15px 36px;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: var(--accent);
        border: 1px solid rgba(113, 84, 58, 0.10);
      }

      .guest-link {
        display: inline-block;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 600;
      }

      .footer-info {
        margin-top: 34px;
        font-size: 0.78rem;
        color: #a39488;
      }

      @media (max-width: 768px) {
        body {
          padding: 24px 0;
          overflow-y: auto;
        }

        .hero-card {
          width: 86%;
          padding: 42px 22px;
        }

        .brand-logo {
          font-size: 2.8rem;
        }

        .stats-grid,
        .action-group {
          flex-direction: column;
          gap: 18px;
        }

        .btn {
          width: 100%;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <div class="hero-card">
      <div class="greeting" id="greeting-text">WELCOME</div>
      <h1 class="brand-logo">朝花夕拾</h1>
      <p class="brand-slogan">向之所欣，俯仰之间，已为陈迹。把稍纵即逝的瞬间，整理成可以回看的时间手册。</p>

      <div class="stats-grid">
        <div class="stat-item">
          <h3 th:data-target="${totalPhotos}" th:text="${totalPhotos}">0</h3>
          <p>Photos Captured</p>
        </div>
        <div class="stat-item">
          <h3 th:data-target="${totalUsers}" th:text="${totalUsers}">0</h3>
          <p>Explorers Joined</p>
        </div>
      </div>

      <div class="action-group">
        <a th:href="@{/login}" class="btn btn-primary">登录账号</a>
        <a th:href="@{/register}" class="btn btn-secondary">注册新用户</a>
      </div>

      <div>
        <a th:href="@{/gallery}" class="guest-link">我是访客，直接进入画廊 &rarr;</a>
      </div>
      <div class="footer-info">Designed by Yiliiii and Gemini · Shot by Yiliiii</div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const hour = new Date().getHours();
        const greetingEl = document.getElementById("greeting-text");
        let text = "GOOD DAY";
        if (hour >= 5 && hour < 12) text = "GOOD MORNING";
        else if (hour >= 12 && hour < 18) text = "GOOD AFTERNOON";
        else text = "GOOD EVENING";
        greetingEl.textContent = text;
      });
    </script>
  </body>
</html>
