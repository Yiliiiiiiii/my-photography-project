<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>我的相册集</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <style>
      body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8f3ea 0%, #f3ede3 100%);
        margin: 0;
        padding: 40px 20px;
        color: #2b221c;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .header h1 {
        margin: 0;
        font-size: 2rem;
        font-family: "Songti SC", "STSong", "SimSun", serif;
        letter-spacing: 0.08em;
      }

      .create-btn {
        background: #b5653b;
        color: #fff;
        border: none;
        padding: 11px 22px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.98rem;
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(181, 101, 59, 0.18);
      }

      .album-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
      }

      .album-card {
        background: rgba(255, 251, 245, 0.88);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(70, 45, 28, 0.08);
        transition: transform 0.2s, box-shadow 0.2s;
        display: block;
        text-decoration: none;
        color: inherit;
        border: 1px solid rgba(113, 84, 58, 0.08);
      }

      .album-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 24px 48px rgba(70, 45, 28, 0.12);
      }

      .cover-img {
        width: 100%;
        height: 190px;
        object-fit: cover;
        background: #eee;
      }

      .card-body {
        padding: 20px;
      }

      .card-body h3 {
        margin: 0 0 8px 0;
        font-size: 1.2rem;
        font-weight: 700;
        color: #2b221c;
      }

      .card-body p {
        margin: 0;
        color: #7a6a5d;
        font-size: 0.92rem;
        line-height: 1.6;
        height: 44px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .count-badge {
        background: rgba(181, 101, 59, 0.10);
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 0.82rem;
        color: #8a5636;
        margin-top: 15px;
        display: inline-block;
        font-weight: 700;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(34, 25, 20, 0.28);
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
      }

      .create-modal {
        background: rgba(255, 251, 245, 0.95);
        padding: 30px;
        border-radius: 24px;
        width: 340px;
        box-shadow: 0 28px 60px rgba(70, 45, 28, 0.18);
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 11px 12px;
        box-sizing: border-box;
        border: 1px solid rgba(113, 84, 58, 0.12);
        border-radius: 14px;
        font-size: 1rem;
        font-family: inherit;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 25px;
      }

      .btn-cancel,
      .btn-submit {
        border: none;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn-cancel {
        background: #efe7db;
        color: #5f5045;
      }

      .btn-submit {
        background: #b5653b;
        color: #fff;
      }

      .footer-links {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid rgba(113, 84, 58, 0.10);
        display: flex;
        gap: 12px;
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        background-color: rgba(255, 251, 245, 0.92);
        color: #5f5045;
        border-radius: 999px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        transition: all 0.2s ease;
        border: 1px solid rgba(113, 84, 58, 0.10);
      }

      .btn-secondary svg {
        width: 16px;
        height: 16px;
        margin-right: 6px;
        stroke-width: 2.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>我的相册集</h1>
        <button class="create-btn" onclick="openCreateModal()">+ 新建相册</button>
      </div>

      <div class="album-grid">
        <a
          th:each="album : ${albums}"
          th:href="@{/album/{id}(id=${album.id})}"
          class="album-card"
        >
          <img
            th:src="${album.coverImageUrl != null ? album.coverImageUrl : '/images/default_cover.png'}"
            class="cover-img"
          />
          <div class="card-body">
            <h3 th:text="${album.title}">相册标题</h3>
            <p th:text="${album.description}">描述</p>
            <span
              class="count-badge"
              th:text="${album.getPhotoCount() + ' 张照片'}"
              >0 张照片</span
            >
          </div>
        </a>
      </div>

      <div
        th:if="${#lists.isEmpty(albums)}"
        style="text-align: center; color: #8c7b6d; margin-top: 80px; font-size: 1.08rem;"
      >
        还没有相册，先创建一个来整理你的回忆吧。
      </div>

      <div class="footer-links">
        <a th:href="@{/gallery}" class="btn-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          返回画廊
        </a>
      </div>
    </div>

    <div id="create-modal" class="modal-overlay">
      <div class="create-modal">
        <h3 style="margin-top: 0; margin-bottom: 20px">新建相册</h3>
        <form id="create-form">
          <div class="form-group">
            <label>名称</label>
            <input type="text" name="title" required placeholder="例如：2025 旅行" />
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea name="description" placeholder="简单介绍一下..."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-cancel" onclick="closeCreateModal()">
              取消
            </button>
            <button type="submit" class="btn-submit">创建</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      function openCreateModal() {
        document.getElementById("create-modal").style.display = "flex";
      }
      function closeCreateModal() {
        document.getElementById("create-modal").style.display = "none";
      }

      document.getElementById("create-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const token = document.querySelector('meta[name="_csrf"]').content;
        const header = document.querySelector('meta[name="_csrf_header"]').content;
        try {
          const res = await fetch("/api/album/create", {
            method: "POST",
            headers: { [header]: token },
            body: fd,
          });
          if (res.ok) window.location.reload();
          else alert("创建失败");
        } catch (err) {
          console.error(err);
        }
      });
    </script>
  </body>
</html>
