# Windows desktop runtime profile.
# Started by the Electron shell with: --spring.profiles.active=win

server.address=127.0.0.1
server.port=${MY_PHOTOGRAPHY_PORT:18080}

spring.datasource.url=jdbc:h2:file:${MY_PHOTOGRAPHY_DATA_DIR:${user.home}/AppData/Local/MyPhotography/data}/my-photography;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=35MB
spring.servlet.multipart.max-request-size=500MB

myapp.upload-dir=${MY_PHOTOGRAPHY_UPLOAD_DIR:${user.home}/AppData/Local/MyPhotography/photos}
myapp.avatar-upload-dir=${myapp.upload-dir}/avatars
myapp.web-config-path=

alibaba.api.key=${ALIBABA_API_KEY:}

management.endpoints.web.exposure.include=health
